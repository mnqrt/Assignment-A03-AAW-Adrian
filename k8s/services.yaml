---
# Catalog Service
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: suilens-2206811474
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: catalog-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: suilens-2206811474
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
      - name: catalog-service
        image: suilens-catalog:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: "postgres://$(CATALOG_DB_USER):$(CATALOG_DB_PASSWORD)@catalog-db:5432/catalog"
        - name: CATALOG_DB_USER
          valueFrom:
            secretKeyRef:
              name: suilens-secrets
              key: CATALOG_DB_USER
        - name: CATALOG_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: suilens-secrets
              key: CATALOG_DB_PASSWORD
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5

---
# Order Service
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: suilens-2206811474
spec:
  ports:
  - port: 3002
    targetPort: 3002
  selector:
    app: order-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: suilens-2206811474
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: suilens-order:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3002
        env:
        - name: DATABASE_URL
          value: "postgres://$(ORDER_DB_USER):$(ORDER_DB_PASSWORD)@order-db:5432/orders"
        - name: ORDER_DB_USER
          valueFrom:
            secretKeyRef:
              name: suilens-secrets
              key: ORDER_DB_USER
        - name: ORDER_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: suilens-secrets
              key: ORDER_DB_PASSWORD
        - name: CATALOG_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: suilens-config
              key: CATALOG_SERVICE_URL
        - name: RABBITMQ_URL
          value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq:5672"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: suilens-secrets
              key: RABBITMQ_USER
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: suilens-secrets
              key: RABBITMQ_PASSWORD
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 15
          periodSeconds: 10

